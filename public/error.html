<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Connection Error - FastPay</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #000000;
      --bg-secondary: #0b0c10;
      --accent-primary: #a29bfe;
      --accent-secondary: #6c5ce7;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --error: #ff7675;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 380px;
      text-align: center;
      padding: 32px 24px;
      border-radius: 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .container::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      z-index: -1;
      border-radius: 22px;
      opacity: 0.15;
    }

    .icon-wrapper {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 24px auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pulse {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--error);
      opacity: 0.15;
      animation: pulse-anim 2s infinite ease-in-out;
    }

    .icon {
      font-size: 2.5rem;
      position: relative;
      z-index: 1;
      animation: bounce-anim 2s infinite ease-in-out;
    }

    @keyframes pulse-anim {
      0% {
        transform: scale(0.9);
        opacity: 0.2;
      }
      50% {
        transform: scale(1.4);
        opacity: 0.05;
      }
      100% {
        transform: scale(0.9);
        opacity: 0.2;
      }
    }

    @keyframes bounce-anim {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #ffffff 40%, #a0a0a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
      transition: all 0.3s ease;
      font-family: 'Outfit', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(108, 92, 231, 0.3);
    }

    .btn-secondary {
      margin-top: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      box-shadow: none;
    }

    .btn-secondary:active {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: none;
    }

    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <div class="pulse"></div>
      <div class="icon">📡</div>
    </div>
    <h1>Connection Lost</h1>
    <p>FastPay could not connect to our secure servers. Please check your network connection and try again.</p>
    
    <button class="btn" id="retryBtn" onclick="handleRetry()">
      <div class="loader" id="loader"></div>
      <span id="btnText">Retry Connection</span>
    </button>
  </div>

  <script>
    function handleRetry() {
      const btn = document.getElementById('retryBtn');
      const loader = document.getElementById('loader');
      const btnText = document.getElementById('btnText');

      // Disable button and show loader
      btn.disabled = true;
      loader.style.display = 'block';
      btnText.textContent = 'Reconnecting...';

      // Reload URL after a tiny delay
      setTimeout(() => {
        window.location.href = 'https://quicklyearning.info';
      }, 800);
    }
  </script>
</body>
</html>
